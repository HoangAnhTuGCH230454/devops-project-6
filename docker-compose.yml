version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres     
      - DB_PORT=5432

      - DB_NAME=Database
      - DB_USER=HoangTu
      - DB_PASSWORD=Anhtu2005@
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:

      - POSTGRES_DB=Database 
      - POSTGRES_USER=HoangTu 
      - POSTGRES_PASSWORD=Anhtu2005@ 
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U HoangTu -d Database"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: