name: CI Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

# This starts a Postgres database *for this job*
  services:
    db:
      image: postgres:14-alpine
      environment:
      - POSTGRES_USER=HoangTu
      - POSTGRES_PASSWORD=Anhtu2005@
      - POSTGRES_DB=Database
    ports:
    - 5432:5432

    options: --health-cmd pg_isready --health-
    interval 10s --health-timeout 5s --health-retries 5

  steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'


    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test
      env:
        DB_HOST: postgres
        DB_USER: HoangTu
        DB_PASSWORD: Anhtu2005@
        DB_NAME: Database